<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/css/member/member_common.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <title>회원가입</title>
</head>
<body>
<div th:replace="~{fragments/layout :: mobileContainer}">
  <div th:fragment="content">
    <div th:replace="~{fragments/topbar :: topBar('회원가입')}"></div>

    <main class="container">
      <form class="member-form" th:action="@{/join}" method="post">
        <label for="email">학교 이메일</label>
        <div class="row">
          <input class="member-control" type="email" name="email" id="email" required>
          <button type="button" id="check-email-btn" class="inline-button primary-button">중복 확인</button>
        </div>
        <div id="email-check-result" class="check-result"></div>

        <label for="univName">학교 이름</label>
        <div class="row">
          <input type="text" id="univName" name="univName" placeholder="학교 이름" required class="member-control" />
          <button type="button" id="send-code-btn" class="inline-button primary-button">인증번호 발송</button>
        </div>

        <label for="verification-code">인증 코드</label>
        <div class="row">
          <input type="text" id="verification-code" name="verificationCode" placeholder="인증 코드" required class="member-control" />
          <button type="button" id="verify-code-btn" class="inline-button primary-button">인증 확인</button>
        </div>
        <div id="verification-result" class="check-result"></div>

        <input type="hidden" name="verified" id="verified" th:value="${verified}" />

        <label for="nickname">닉네임</label>
        <div class="row">
          <input class="member-control" type="text" name="nickname" id="nickname" required>
          <button type="button" id="check-nickname-btn" class="inline-button primary-button">중복 확인</button>
        </div>
        <div id="nickname-check-result" class="check-result"></div>

        <label for="password">비밀번호</label>
        <input class="member-control" type="password" name="password" id="password" required>
        <br>
        <button class="primary-button" type="submit">회원가입</button>
        <button class="secondary-button" type="button" onclick="location.href='/login'">로그인으로 돌아가기</button>
      </form>
    </main>

    <div th:replace="~{fragments/bottombar :: bottomNav('none')}"></div>
  </div>
</div>

<script src="/js/verify.js"></script>
</body>
</html>
