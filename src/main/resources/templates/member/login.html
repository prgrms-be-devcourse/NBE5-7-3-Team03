<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/member/member_common.css" />
    <link rel="stylesheet" href="/css/styles.css" />
    <title>로그인</title>
</head>
<body>
<div th:replace="~{fragments/layout :: mobileContainer}">
    <div th:fragment="content">
        <div th:replace="~{fragments/topbar :: topBar('로그인')}"></div>

        <main class="container login-page">
            <form class="member-form" th:action="@{/login}" method="post">

                <script th:if="${successMessage}" th:inline="javascript">
                    alert([[${successMessage}]]);
                </script>

                <label for="email">이메일</label>
                <input class="member-control" type="email" name="email" id="email" required>

                <label for="password">비밀번호</label>
                <input class="member-control" type="password" name="password" id="password" required>
                <button class="primary-button" type="submit">로그인</button>
                <button class="secondary-button" type="button" th:onclick="|location.href='@{/join}'|">회원가입</button>
            </form>
        </main>

        <div th:replace="~{fragments/bottombar :: bottomNav('none')}"></div>
    </div>
</div>
</body>
</html>
