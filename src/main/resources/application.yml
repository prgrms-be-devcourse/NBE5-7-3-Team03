# application.yml (Git 포함)
spring:
  datasource:
    url: jdbc:mysql://localhost:3307/gongguri
    username: root
    password: 123123
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    mongodb:
      uri: mongodb://root:123123@localhost:27018/chat?authSource=admin

  profiles:
    active: test

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  certification:
    api-key: ${UNIV_CERTIFICATION_API_KEY}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        show_sql: true

  web:
    resources:
      static-locations: file:${user.home}/gongguri-uploads/, classpath:/static/

  mvc:
    static-path-pattern: /**