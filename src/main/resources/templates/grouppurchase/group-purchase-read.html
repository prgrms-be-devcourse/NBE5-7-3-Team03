<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공동구매 상세</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/groupPurchase/group-purchase-read_style.css}" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<div th:replace="~{fragments/layout :: mobileContainer}">
    <div th:fragment="content">
        <div th:replace="~{fragments/topbar :: topBar('공동구매 상세')}"></div>

        <main class="container">

            <!-- 제목 + 진행 상태 + 가격 -->
            <div class="purchase-header">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 id="groupTitle" class="title">제목</h2>

                    <!-- 점세개 메뉴 -->
                    <div id="menu-wrapper" class="menu-wrapper">
                        <button id="menu-button" class="menu-button">⋮</button>
                        <div id="menu-dropdown" class="menu-dropdown">
                            <button onclick="manageParticipants()" class="menu-manage-button">참여자 관리</button>
                            <button onclick="editPost()" class="menu-edit-button">수정하기</button>
                            <button onclick="deletePost()" class="menu-delete-button">삭제하기</button>
                        </div>
                    </div>
                </div>

                <!-- 상태/가격 -->
                <div class="meta-info">
                    <span id="groupStatus" class="badge status">진행중</span>
                    <span class="price">
                        <small style="font-size: 14px; font-weight: 400; margin-right: 6px;">1인당</small>
                        <span id="groupPrice">₩0</span>
                    </span>
                </div>
            </div>

            <!-- ✅ 작성자 정보 -->
            <button class="profile-button">
                <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="프로필" class="profile-icon" />
                <div class="profile-info">
                    <span id="writerNickname" class="nickname">작성자</span>
                </div>
            </button>

            <!-- ✅ 본문 내용 위 등록한 사진 표시 -->
            <img id="productImage" src="/images/default.png" alt="상품 이미지" class="product-image" />

            <!-- ✅ 본문 내용 -->
            <div class="group-content" id="groupContent">
                본문이 들어갑니다.
            </div>

            <!-- ✅ 참가 버튼 + 인원 -->
            <div class="group-action-area">
                <div class="member-count-box">
                    👥 <span id="memberCount">0/0</span>
                </div>
                <button class="join-button">참가하기</button>
            </div>

        </main>

        <div th:replace="~{fragments/bottombar :: bottomNav('home')}"></div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const groupId = [[${groupId}]];
        const currentUserEmail = '[[${#authentication.principal.username}]]';

        try {
            const res = await fetch(`/api/group-purchases/${groupId}`);
            const data = await res.json();

            window.writerId = data.writerId

            const statusMap = {
                RECRUITING: { text: "진행중", class: "status-open" },
                CLOSED: { text: "모집 마감", class: "status-closed" },
                COMPLETED: { text: "구매 완료", class: "status-completed" }
            }
            document.getElementById("groupTitle").innerText = data.title;

            const groupStatusEl = document.getElementById("groupStatus");
            const statusInfo = statusMap[data.progressStatus] || { text: "알 수 없음", class: "status-unknown" };
            groupStatusEl.innerText = statusInfo.text;
            groupStatusEl.classList.remove("status-open", "status-closed", "status-completed", "status-unknown");
            groupStatusEl.classList.add(statusInfo.class);

            document.getElementById("groupPrice").innerText = `₩${data.price.toLocaleString()}`;
            document.getElementById("writerNickname").innerText = data.writerNickname ?? "작성자";
            document.getElementById("groupContent").innerText = data.content;
            document.getElementById("memberCount").innerText = `${data.currentParticipants}/${data.maxParticipants}`;
            if (data.imageUrl) document.getElementById("productImage").src = data.imageUrl;

            // 👇 작성자일 경우에만 메뉴 보이기
            console.log("작성자 이메일:", data.writerEmail);
            console.log("현재 로그인 사용자:", currentUserEmail);
            if (data.writerEmail === currentUserEmail) {
                console.log("✅ 작성자 일치 → 메뉴 보여줌");
                document.getElementById("menu-wrapper").style.display = "inline-block";
            }
        } catch (err) {
            alert("상세 정보를 불러오지 못했습니다.");
        }
    });

    document.addEventListener("click", (e) => {
        const menuButton = document.getElementById("menu-button");
        const menuDropdown = document.getElementById("menu-dropdown");

        if (menuButton.contains(e.target)) {
            menuDropdown.style.display = menuDropdown.style.display === "block" ? "none" : "block";
        } else {
            menuDropdown.style.display = "none";
        }
    });

    function editPost() {
        const groupId = [[${groupId}]];
        location.href = `/group-purchase/update?id=${groupId}`;
    }

    function deletePost() {
        const groupId = [[${groupId}]];
        if (confirm("정말 삭제하시겠습니까?")) {
            fetch(`/api/group-purchases/${groupId}`, {
                method: "DELETE"
            }).then(res => {
                if (res.ok) {
                    alert("삭제 완료");
                    window.location.href = "/group-purchase";
                } else {
                    alert("삭제 실패");
                }
            });
        }
    }

    // ✅ 여기에 추가
    function manageParticipants() {
        const groupId = [[${groupId}]];
        location.href = `/group-purchase/${groupId}/participants`;
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const groupId = [[${groupId}]];

        try {
            const res = await fetch(`/api/group-purchases/${groupId}`);
            const data = await res.json();

            const joinButton = document.querySelector(".join-button");
            const memberCount = document.getElementById("memberCount");

            // 참여자 수
            memberCount.innerText = `${data.currentParticipants}/${data.maxParticipants}`;

            if (data.progressStatus === "COMPLETED") {
                joinButton.disabled = true;
                joinButton.innerText = "구매 완료";
                joinButton.style.backgroundColor = "#ccc";
                joinButton.style.cursor = "not-allowed";
            } else if (data.currentParticipants >= data.maxParticipants || data.progressStatus === "CLOSED") {
                joinButton.disabled = true;
                joinButton.innerText = "모집 마감";
                joinButton.style.backgroundColor = "#ccc";
                joinButton.style.cursor = "not-allowed";
            } else if (data.participated) {
                joinButton.disabled = true;
                joinButton.innerText = "참여중";
                joinButton.style.backgroundColor = "#ccc";
                joinButton.style.cursor = "not-allowed";
            } else {
                joinButton.disabled = false;
                joinButton.innerText = "참가하기";
                joinButton.style.backgroundColor = "#007bff";
                joinButton.style.cursor = "pointer";
            }

        } catch (err) {
            alert("상세 정보를 불러오지 못했습니다.");
        }
    });

    document.querySelector(".profile-button").addEventListener("click", () => {
        const writerId = window.writerId;
        if (writerId) {
            window.location.href = `/profile/${writerId}`;
        } else {
            alert("작성자 정보를 불러오지 못했습니다.");
        }
    });

    document.querySelector(".join-button").addEventListener("click", async () => {
        const groupId = [[${groupId}]];

        const res = await fetch(`/api/group-purchases/${groupId}/join`, {
            method: "POST"
        });

        if (res.ok) {
            alert("참여 완료!");
            location.reload();
        } else {
            alert("참여에 실패했습니다.");
        }
    });


</script>
</body>
</html>
