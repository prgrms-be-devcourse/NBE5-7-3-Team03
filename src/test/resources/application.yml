spring:
  datasource:
    url: jdbc:h2:mem:test-db
    username: sa
    password:
    driver-class-name: org.h2.Driver

  data:
    mongodb:
      database: testdb
      port: 27017
      host: localhost

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true
