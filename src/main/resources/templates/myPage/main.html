<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/myPage/mypage_common.css" />
    <link rel="stylesheet" href="/css/styles.css" />
    <title>마이페이지</title>
</head>
<body>
<div th:replace="~{fragments/layout :: mobileContainer}">
    <div th:fragment="content">
        <div th:replace="~{fragments/topbar :: topBar('마이페이지')}"></div>

        <main class="container">
            <!-- 프로필 카드 -->
            <div class="profile-card" th:onclick="|location.href='@{/my-page/profile}'|">
                <div class="profile-left">
                    <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="profile-img" alt="프로필"/>
                    <span class="nickname" th:text="${nickname}">닉네임</span>
                    <div class="like-info">
                        <span class="like-count">👍🏻 좋아요: <span th:text="${likeCount}">0</span></span>
                        <span class="dislike-count">👎🏻 싫어요: <span th:text="${dislikeCount}">0</span></span>
                    </div>
                </div>
                <div class="profile-right">
                    <svg class="arrow-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="24" height="24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </div>

            <!-- 메뉴 -->
            <ul class="menu-list">
                <li class="menu-item" th:onclick="|location.href='@{/my-page/purchase}'|">거래내역</li>
                <li class="menu-item logout" th:onclick="|location.href='@{/logout}'|">로그아웃</li>
            </ul>
        </main>

        <div th:replace="~{fragments/bottombar :: bottomNav('mypage')}"></div>
    </div>
</div>
</body>
</html>
